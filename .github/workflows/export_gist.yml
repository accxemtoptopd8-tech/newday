- name: Ghi đè lên Gist bằng REST API
  env:
    GH_TOKEN: ${{ secrets.GHN_PAT }}
  run: |
    # Đọc nội dung file, escape JSON an toàn bằng jq
    content=$(cat AIbusinessOS | jq -sR .)
    curl -X PATCH \
      -H "Authorization: token $GH_TOKEN" \
      -H "Content-Type: application/json" \
      -d "{\"files\": {\"AIBusinessOS\": {\"content\": $content}}}" \
      https://api.github.com/gists/15d2b34327c0323ff2d1864fdb279a98
