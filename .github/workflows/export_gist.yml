name: 🧠 Đúc Mega-Context & Xuất Gist

on:
  workflow_dispatch:

jobs:
  export-master-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Cài đặt Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Đúc tệp Mega-Context
        run: python3 repo_scanner.py

      - name: Đẩy đè lên Gist cũ của Sếp
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # 1. Kiểm tra an toàn: Nếu quên nạp Key, báo lỗi luôn để khỏi treo máy
          if [ -z "$GH_TOKEN" ]; then
            echo "❌ LỖI CHÍ MẠNG: Sếp chưa nạp GH_PAT vào Settings > Secrets của Repo này!"
            exit 1
          fi
          
          # 2. Ép xác thực an toàn bằng biến môi trường (không dùng lệnh đăng nhập thủ công)
          # 3. Ghi đè nội dung mới lên Gist ID của Sếp
          gh gist edit c17fd2e68c12d1742522b86808bbe45d -f ai_os_master_context.md ai_os_master_context.md
          
          echo "🎉 ĐÃ GHI ĐÈ THÀNH CÔNG LÊN GIST CŨ!"
          echo "👉 Sếp cứ dùng link này cho khung chat mới: https://gist.github.com/c17fd2e68c12d1742522b86808bbe45d"
          echo "GIST_URL=https://gist.github.com/c17fd2e68c12d1742522b86808bbe45d" >> $GITHUB_STEP_SUMMARY
