name: 🧠 Đúc Mega-Context & Xuất Gist

on:
  workflow_dispatch:

jobs:
  export-master-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Cài đặt Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Đúc tệp Mega-Context
        run: python3 repo_scanner.py

      - name: Ghi đè lên Gist mới tinh của Giám đốc
        env:
          GH_TOKEN: ${{ secrets.GHN_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "❌ LỖI: Sếp chưa cấu hình Secret đặt tên là GHN_PAT trong Settings của Repo này!"
            exit 1
          fi
          
          # Đẩy nội dung Mega-Context đè thẳng vào file tên là "AIbusinessOS" trên Gist của Sếp
          gh gist edit a73e1501996ae58e5824cb4f3c4e97f0 -f AIbusinessOS=ai_os_master_context.md
          
          echo "🎉 ĐÃ BƠM ĐẦY DỮ LIỆU VÀO ĐÚNG LINK SẾP ĐANG XEM!"
