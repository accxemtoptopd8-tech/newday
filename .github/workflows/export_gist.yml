name: 🧠 Đúc Mega-Context & Xuất Gist

on:
  workflow_dispatch:

jobs:
  export-master-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Cài đặt Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Đúc tệp Mega-Context
        run: python3 repo_scanner.py

      - name: Ghi đè lên Gist
        env:
          GH_TOKEN: ${{ secrets.GHN_PAT }}
        run: |
          # Đổi tên file local giống hệt tên file trên Gist
          mv ai_os_master_context.md AIbusinessOS
          
          # Đẩy thẳng lên không cần tham số lằng nhằng
          gh gist edit 45fd7467b3e2dc0adae7ad113218914df71c96ae
          
          echo "🎉 BƠM DỮ LIỆU THÀNH CÔNG!"
